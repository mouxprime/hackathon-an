<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hémicycle — Assistant citoyen de l'Assemblée nationale</title>
    <!-- Anti-flash : applique le thème (sauvegardé ou préférence système) avant le 1er rendu. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('hemicycle.theme.v1')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          if (t === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
